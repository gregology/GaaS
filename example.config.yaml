# GaaS example config. A single email integration to get started.
# See packages/gaas-email/README.md, packages/gaas-github/README.md,
# and packages/gaas-gemini/README.md for more config options and examples.

llms:
  default:
    base_url: http://localhost:11434          # Ollama server URL
    model: your-model-name:latest
    parameters:                               # Passed directly to the API
      temperature: 0.7

integrations:
  - type: email
    name: personal
    imap_server: imap.example.com
    username: you@example.com
    password: !secret personal_email_password
    schedule:
      every: 30m
    llm: default
    platforms:
      inbox:
        limit: 50
        classifications:                        # Optional, defaults are used if omitted
          human: is this a personal email written by a human?
          requires_response:
            prompt: does this email require a response?
            type: boolean
        automations:
          # Deterministic: archive calendar events (no LLM needed)
          - when:
              is_calendar_event: true
            then: archive
          # LLM-based: archive emails that aren't from a human
          - when:
              classification.human: "< 0.2"
            then: archive

directories:
  notes: /path/to/notes
  task_queue: /path/to/task_queue
  logs: /path/to/logs
