<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GaaS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/alpinejs@3.14.3" defer></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen bg-base-200">
  <div class="navbar bg-base-100 shadow-lg">
    <div class="navbar-start">
      <a href="/ui/" class="btn btn-ghost text-xl">GaaS</a>
    </div>
    <div class="navbar-center">
      <ul class="menu menu-horizontal px-1">
        <li><a href="/ui/">Dashboard</a></li>
        <li><a href="/ui/config">Config</a></li>
        <li><a href="/ui/queue">Queue</a></li>
        <li><a href="/ui/logs">Logs</a></li>
      </ul>
    </div>
    <div class="navbar-end"></div>
  </div>
  <main class="container mx-auto p-6">
    {% if config_dirty %}
    <div class="alert alert-info mb-4">
      {% if supervisor_active %}
      <span>Config has been updated.</span>
      <form method="POST" action="/ui/system/restart" class="inline">
        <button type="submit" class="btn btn-sm btn-primary ml-2">Restart GaaS</button>
      </form>
      {% else %}
      Config has been updated. Restart GaaS for changes to take effect.
      {% endif %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer class="footer footer-center p-4 text-base-content">
    <p>GaaS — Greg as a Service</p>
  </footer>
</body>
</html>
