domain: email
name: "Email (IMAP)"
version: "1.0.0"
entry_task: check
dependencies: []
config_schema:
  properties:
    imap_server:
      type: string
    imap_port:
      type: integer
      default: 993
    username:
      type: string
    password:
      type: string
    limit:
      type: integer
      default: 50
  required:
    - imap_server
    - username
    - password
