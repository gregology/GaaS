# Structured context for gaas-sdk package
# Note: the SDK import boundary rule does NOT apply here -- this IS the SDK.
# Candidate #5 (const.py spec) included for reference since SDK defines the contract.

context:
  # Safety-critical code reminder
  - match: ["**/evaluate.py", "**/actions.py", "**/provenance.py"]
    on: [edit]
    when: after
    content: |
      This is the safety-critical code path. evaluate.py is where bugs become
      irreversible actions. Any change to condition matching or action partitioning
      needs corresponding safety test updates in tests/safety/.

  # SDK has no dependency on app.*
  - match: ["**/*.py"]
    on: [edit, create]
    when: after
    content: |
      The SDK has no dependency on app.*. If you find yourself importing from app,
      you're going the wrong direction. Run `uv run lint-imports` to verify.
