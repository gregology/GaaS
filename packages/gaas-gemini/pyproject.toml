[project]
name = "gaas-gemini"
version = "0.1.0"
description = "Google Gemini integration for GaaS"
requires-python = ">=3.11"
dependencies = [
    "gaas-sdk>=0.1.0",
    "google-genai>=1.0",
]

[project.entry-points."gaas.integrations"]
gemini = "gaas_gemini"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gaas_gemini"]
