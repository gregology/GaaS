[project]
name = "gaas-github"
version = "0.1.0"
description = "GitHub integration for GaaS"
requires-python = ">=3.11"
dependencies = [
    "gaas-sdk>=0.1.0",
]

[project.entry-points."gaas.integrations"]
github = "gaas_github"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gaas_github"]
